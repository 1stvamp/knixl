# mise tasks for knixl. The Rust toolchain itself is pinned in rust-toolchain.toml
# (1.87.0, honoured by rustup), so mise only drives the workflow here.

[env]
# Put both build outputs on PATH so `knixl` is callable directly after a build,
# e.g. `mise run build && knixl check`. Debug first, release as a fallback.
_.path = ["target/debug", "target/release"]

[tasks.build]
description = "Build the whole workspace (debug)"
run = "cargo build"

[tasks."build:release"]
description = "Build the whole workspace (release, LTO)"
run = "cargo build --release"

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks.lint]
description = "Clippy across the workspace, warnings as errors"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.fmt]
description = "Format all crates"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check formatting without writing"
run = "cargo fmt --all --check"

[tasks.check]
description = "Type-check without producing binaries"
run = "cargo check --workspace"

[tasks."run:debug"]
description = "Run the knixl CLI (args pass through, e.g. `mise run run -- check`)"
run = "cargo run --quiet -p knixl-cli --"

[tasks."run:release"]
description = "Run the release knixl CLI (args pass through)"
run = "cargo run --quiet --release -p knixl-cli --"

[tasks."install:release"]
description = "Build release and install `knixl` to ~/.local/bin (override with KNIXL_INSTALL_DIR)"
depends = ["build:release"]
run = "KNIXL_SRC=target/release/knixl mise run install:knixl"

[tasks."install:debug"]
description = "Build debug and install `knixl` to ~/.local/bin (fast local build; override with KNIXL_INSTALL_DIR)"
depends = ["build"]
run = "KNIXL_SRC=target/debug/knixl mise run install:knixl"

# Shared installer body, reused by install:release and install:debug. KNIXL_SRC picks the
# binary to copy; not meant to be run directly.
[tasks."install:knixl"]
hide = true
run = """
src="${KNIXL_SRC:-target/release/knixl}"
dir="${KNIXL_INSTALL_DIR:-$HOME/.local/bin}"
mkdir -p "$dir"
install -m 0755 "$src" "$dir/knixl"
echo "installed knixl -> $dir/knixl"
case ":$PATH:" in
  *":$dir:"*) ;;
  *) echo "note: $dir is not on your PATH" ;;
esac
"""

[tasks."uninstall:release"]
description = "Remove the installed `knixl` from ~/.local/bin (override with KNIXL_INSTALL_DIR)"
run = """
dir="${KNIXL_INSTALL_DIR:-$HOME/.local/bin}"
rm -f "$dir/knixl" && echo "removed $dir/knixl"
"""
