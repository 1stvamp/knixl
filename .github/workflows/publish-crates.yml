name: Publish crates
# Publishes the workspace to crates.io on a `v*` tag push (or a manual run). Kept
# as a sibling to release.yml (dist-generated) rather than an appended job there:
# `dist generate` rewrites release.yml wholesale on every `dist init`/`dist
# generate`, so a hand-added job in that file would be silently dropped on the
# next dist upgrade.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # cargo-workspaces needs a newer rustc than the repo's 1.87 floor to compile.
      # rust-toolchain.toml would otherwise force 1.87 for this step, so override it
      # to stable just for the install. The publish itself then runs on the pinned
      # toolchain, which is fine (rust-version is a minimum, not a ceiling).
      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --locked
        env:
          RUSTUP_TOOLCHAIN: stable
      - run: cargo ws publish --from-git --yes --no-git-commit --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
